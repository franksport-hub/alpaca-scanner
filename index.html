<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screener: Gap-Ups & News</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: #161b22; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #30363d; }
        h1 { color: #58a6ff; font-size: 1.5em; border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-top: 0; }
        
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 0.85em; font-weight: bold; color: #8b949e; margin-bottom: 5px; }
        input[type="text"], input[type="number"], input[type="date"], input[type="password"] {
            padding: 8px; border: 1px solid #30363d; border-radius: 4px; background: #0d1117; color: #c9d1d9; font-family: monospace;
        }
        
        .checkbox-label { display: flex; align-items: center; gap: 8px; font-weight: normal; color: #c9d1d9; font-family: sans-serif; cursor: pointer; padding-top: 8px;}
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }

        .full-width { grid-column: 1 / -1; }
        textarea { width: 100%; padding: 10px; border: 1px solid #30363d; border-radius: 4px; background: #0d1117; color: #c9d1d9; font-family: monospace; height: 100px; resize: vertical; box-sizing: border-box;}
        
        button { background-color: #238636; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1em; width: 100%; transition: 0.2s; margin-top: 10px;}
        button:hover { background-color: #2ea043; }
        button:disabled { background-color: #21262d; color: #8b949e; cursor: not-allowed; }
        
        .table-container { margin-top: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; text-align: right; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #30363d; }
        th { background-color: #21262d; color: #c9d1d9; text-align: right; font-weight: bold; position: sticky; top: 0; }
        th:first-child, td:first-child { text-align: left; }
        tr:hover { background-color: #1c2128; }
        
        .ticker { font-weight: bold; color: #58a6ff; }
        .pos { color: #3fb950; font-weight: bold; }
        .news-badge { background: #d29922; color: #000; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        
        .action-link { background: #1f6feb; color: white; padding: 4px 8px; border-radius: 4px; text-decoration: none; font-size: 0.8em; }
        .action-link:hover { background: #388bfd; }
        
        #statusMessage { margin-top: 15px; font-size: 0.9em; font-family: monospace; color: #8b949e; }
        .copy-box { margin-top: 15px; display: none; background: #1c2128; padding: 10px; border-radius: 6px; border: 1px solid #3fb950; }
    </style>
</head>
<body>

<div class="container">
    <h1>Screener: Gap-Ups & News</h1>
    
    <div class="filter-grid">
        <div class="form-group">
            <label>API Key ID</label>
            <input type="text" id="apiKey" placeholder="AK...">
        </div>
        <div class="form-group">
            <label>Secret Key</label>
            <input type="password" id="apiSecret" placeholder="Secret...">
        </div>
        <div class="form-group">
            <label>Vorige Handelsdag</label>
            <input type="date" id="dateYesterday">
        </div>
        <div class="form-group">
            <label>Scan Dag (Gap up dag)</label>
            <input type="date" id="dateToday">
        </div>
    </div>

    <div class="filter-grid" style="background: #21262d; padding: 15px; border-radius: 6px;">
        <div class="form-group">
            <label>Min Prijs ($)</label>
            <input type="number" id="minPrice" value="3" step="0.5">
        </div>
        <div class="form-group">
            <label>Max Prijs ($)</label>
            <input type="number" id="maxPrice" value="25" step="0.5">
        </div>
        <div class="form-group">
            <label>Min Volume</label>
            <input type="number" id="minVol" value="500000" step="50000">
        </div>
        <div class="form-group">
            <label>Min Gap %</label>
            <input type="number" id="minGap" value="1.0" step="0.5">
        </div>
        <div class="form-group full-width">
            <label class="checkbox-label">
                <input type="checkbox" id="requireNews">
                Alleen aandelen TONEN die 'Breaking News' hadden op de Scan Dag
            </label>
        </div>
    </div>
    
    <div class="form-group full-width" style="margin-top: 15px;">
        <label>Ticker Universe (Kopieer/Plak direct uit Excel of TOS)</label>
        <textarea id="tickers">AAPL, TSLA, NVDA</textarea>
    </div>
    
    <button id="startScan">Scan Uitvoeren</button>
    <div id="statusMessage">Klaar om te scannen... Zorg dat je datums kiest waarop de beurs open was!</div>
    
    <div class="copy-box" id="copyBox">
        <label style="color: #3fb950;">Kopieer deze lijst naar ThinkOrSwim OnDemand:</label>
        <input type="text" id="finalTickers" readonly style="width: 100%; margin-top: 5px;">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Ticker</th>
                    <th>Nieuws</th>
                    <th>Vorige Close</th>
                    <th>Vandaag Open</th>
                    <th>Gap %</th>
                    <th>Volume (Gisteren)</th>
                    <th>Chart</th>
                </tr>
            </thead>
            <tbody id="resultsTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    const btn = document.getElementById('startScan');
    const statusMsg = document.getElementById('statusMessage');
    const tableBody = document.getElementById('resultsTableBody');
    const copyBox = document.getElementById('copyBox');
    const finalTickersInput = document.getElementById('finalTickers');

    btn.addEventListener('click', async () => {
        try {
            statusMsg.innerText = "Bezig met ophalen van invoer...";
            btn.disabled = true;

            const apiKey = document.getElementById('apiKey').value.trim();
            const apiSecret = document.getElementById('apiSecret').value.trim();
            const dateYesterday = document.getElementById('dateYesterday').value;
            const dateToday = document.getElementById('dateToday').value;
            const tickersRaw = document.getElementById('tickers').value;

            const minPrice = parseFloat(document.getElementById('minPrice').value) || 0;
            const maxPrice = parseFloat(document.getElementById('maxPrice').value) || 9999;
            const minVol = parseInt(document.getElementById('minVol').value) || 0;
            const minGap = parseFloat(document.getElementById('minGap').value) || 0;
            const requireNews = document.getElementById('requireNews').checked;

            if(!apiKey || !apiSecret || !dateYesterday || !dateToday || !tickersRaw) {
                statusMsg.innerText = "Fout: Vul alle velden in (API keys en datums).";
                btn.disabled = false;
                return;
            }

            const tickers = tickersRaw.split(/[\n\s,]+/).map(t => t.trim().toUpperCase()).filter(t => t);

            if(tickers.length === 0) {
                 statusMsg.innerText = "Fout: Geen geldige tickers gevonden in het tekstvak.";
                 btn.disabled = false;
                 return;
            }

            tableBody.innerHTML = "";
            copyBox.style.display = "none";
            statusMsg.innerText = `Lijst scannen... ${tickers.length} tickers gevonden. Data ophalen via Alpaca...`;

            let allResults = [];
            let processedCount = 0;
            const chunkSize = 100;

            // STAP 1: Filter op Prijs, Volume en Gap
            for (let i = 0; i < tickers.length; i += chunkSize) {
                const chunk = tickers.slice(i, i + chunkSize);
                const url = `https://data.alpaca.markets/v2/stocks/bars?symbols=${chunk.join(',')}&timeframe=1Day&start=${dateYesterday}&end=${dateToday}&adjustment=all`;

                const response = await fetch(url, {
                    method: 'GET',
                    headers: { 'APCA-API-KEY-ID': apiKey, 'APCA-API-SECRET-KEY': apiSecret, 'Accept': 'application/json' }
                });

                if (!response.ok) throw new Error(`API Foutmelding: ${response.status} - ${response.statusText}.`);

                const data = await response.json();
                const bars = data.bars || {};

                for (const ticker in bars) {
                    const tickerData = bars[ticker];
                    if (tickerData.length >= 2) {
                        tickerData.sort((a, b) => new Date(a.t) - new Date(b.t));
                        const yesterday = tickerData[tickerData.length - 2];
                        const today = tickerData[tickerData.length - 1];

                        const prevClose = yesterday.c;
                        const prevVolume = yesterday.v;
                        const openToday = today.o;

                        const gapPercentage = ((openToday - prevClose) / prevClose) * 100;

                        if (prevClose >= minPrice && prevClose <= maxPrice && prevVolume >= minVol && gapPercentage >= minGap) {
                            allResults.push({ ticker, prevClose, openToday, gapPct: gapPercentage, volume: prevVolume, hasNews: false });
                        }
                    }
                }
                processedCount += chunk.length;
                statusMsg.innerText = `Voortgang: ${processedCount} van de ${tickers.length} tickers gescand op prijs/volume...`;
            }

            // STAP 2: Controleren op Breaking News voor de overgebleven kandidaten
            if (allResults.length > 0) {
                statusMsg.innerText = `Nieuws checken voor de ${allResults.length} voorlopige kandidaten...`;
                
                // Haal alleen tickers op die stap 1 hebben overleefd
                const survivorTickers = allResults.map(r => r.ticker);
                
                // Roep Alpaca News API aan (limiet is max 50 symbolen per call, dus we knippen deze ook op)
                const newsChunkSize = 50;
                let tickersWithNews = new Set();

                for (let i = 0; i < survivorTickers.length; i += newsChunkSize) {
                    const chunk = survivorTickers.slice(i, i + newsChunkSize);
                    // Zoek nieuws tussen 00:00 en 23:59 op de 'Scan Dag'
                    const newsUrl = `https://data.alpaca.markets/v1beta1/news?symbols=${chunk.join(',')}&start=${dateToday}T00:00:00Z&end=${dateToday}T23:59:59Z`;
                    
                    const newsResponse = await fetch(newsUrl, {
                        headers: { 'APCA-API-KEY-ID': apiKey, 'APCA-API-SECRET-KEY': apiSecret }
                    });

                    if (newsResponse.ok) {
                        const newsData = await newsResponse.json();
                        const articles = newsData.news || [];
                        
                        // Noteer welke tickers in de nieuwsberichten werden genoemd
                        articles.forEach(article => {
                            article.symbols.forEach(sym => tickersWithNews.add(sym));
                        });
                    }
                }

                // Update de resultaten met de nieuws-status
                allResults.forEach(r => {
                    r.hasNews = tickersWithNews.has(r.ticker);
                });

                // Filter de lijst als de gebruiker het vinkje heeft gezet
                if (requireNews) {
                    allResults = allResults.filter(r => r.hasNews);
                }
            }

            // STAP 3: Resultaten sorteren en tonen
            allResults.sort((a, b) => b.gapPct - a.gapPct);

            if(allResults.length > 0) {
                statusMsg.innerText = `Klaar! ${allResults.length} definitieve kandidaten gevonden.`;

                allResults.forEach(r => {
                    const row = document.createElement('tr');
                    const volFormatted = r.volume >= 1000000
                        ? (r.volume / 1000000).toFixed(2) + 'M'
                        : (r.volume / 1000).toFixed(0) + 'K';
                        
                    const newsTag = r.hasNews ? '<span class="news-badge">JA</span>' : '-';

                    row.innerHTML = `
                        <td class="ticker">${r.ticker}</td>
                        <td>${newsTag}</td>
                        <td>$${r.prevClose.toFixed(2)}</td>
                        <td>$${r.openToday.toFixed(2)}</td>
                        <td class="pos">+${r.gapPct.toFixed(2)}%</td>
                        <td>${volFormatted}</td>
                        <td><a href="https://finviz.com/quote.ashx?t=${r.ticker}" target="_blank" class="action-link">Chart</a></td>
                    `;
                    tableBody.appendChild(row);
                });

                const validTickers = allResults.map(r => r.ticker);
                copyBox.style.display = "block";
                finalTickersInput.value = validTickers.join(', ');
            } else {
                statusMsg.innerText = "Scan voltooid. Geen enkel aandeel voldeed aan de filters (of miste nieuws).";
            }

        } catch (error) {
            statusMsg.innerText = `Fout: ${error.message}`;
            console.error(error);
        } finally {
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
